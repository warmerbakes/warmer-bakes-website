<!DOCTYPE html>
<html lang="en" data-bs-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warmer Bakes & Cakes</title>
    <meta name="description"
        content="Professional AC installation, repair, and maintenance services. 24/7 emergency support with certified technicians.">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>
 

/* Floating items */
.fi {
    position: absolute;
    opacity: 0.80;
    pointer-events: none;
}

/* Positions (clean & balanced) */
.fi-left {
    left:1%;
    top: 50%;
    transform: translateY(-50%);
}

.fi-top-right {
    right: 1%;
    top:4%;
}

.fi-mid-right {
    right: 5%;
    top: 80%;
}

/* Responsive control */
@media (max-width: 768px) {
    .fi {
        opacity: 0.90;
    }
}
    </style>
</head>

<body>

<!-- ── NAV ── -->
<nav class="bakzy-nav">
  <!-- Left links -->
  <ul class="nav-group">
    <li><a href="/">Home</a></li>
  <li><a href="#what_we_make">What We Make</a></li>
  <li><a href="#gallery">Gallery</a></li>
</ul>

  <!-- Center logo -->
  <a class="nav-logo" href="/">Warmer Bakes & Cakes</a>

  <!-- Right links -->  
  <ul class="nav-group">
  <li><a href="/menu">Menu</a></li>
  <li><a href="/admin_login">Admin</a></li>
  <li><a href="#" class="nav-icon">☰</a></li>
</ul>

  <!-- Hamburger (mobile) -->
  <button class="hamburger-btn" id="hamburger">
    <span></span><span></span><span></span>
  </button>
</nav>

<!-- Mobile drawer -->
<div class="mobile-drawer" id="mobileDrawer">
    <div class="drawer-close" id="drawerClose">✕</div>

<a href="/">Home</a>
  <a href="#what_we_make">What We Make</a>
  <a href="#gallery">Gallery</a>
  <a href="/menu">Menu</a>
  <a href="/admin_login">Admin</a>
  <div class="drawer-handle"></div>
</div>



    {% block content %}{% endblock %}
<!-- 
   Footer -->
    <footer class="py-4" style="background-color: #4c2e2d; color:#e0cbb8;">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-6">
                    <p class="mb-0" data-testid="footer-copyright">&copy; All rights reserved.</p>
                </div>
                <div class="col-md-6 text-md-end">
                    <a href="#home" class="text-light text-decoration-none" data-testid="footer-back-to-top">
                        <i class="bi bi-arrow-up-circle me-2"></i>Back to Top
                    </a>
                </div>
            </div>
        </div>
    </footer>  

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
  const hamburger = document.getElementById("hamburger");
  const drawer = document.getElementById("mobileDrawer");
  const closeBtn = document.getElementById("drawerClose");

  hamburger.addEventListener("click", () => {
    drawer.classList.toggle("active");
  });

  closeBtn.addEventListener("click", () => {
    drawer.classList.remove("active");
  });

  drawer.querySelectorAll("a").forEach(link => {
    link.addEventListener("click", () => {
      drawer.classList.remove("active");
    });
  });
</script>
</body>

</html>
